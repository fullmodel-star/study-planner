<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#ff6a1a">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="ridgeline-ui.css">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="火影修行計畫">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>火影修行計畫・學習日曆</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#fdf4e3;--card:#fffdf8;--ink:#2b2417;--muted:#8a7355;--line:#efe0c6;
    --brand:#ff6a1a;--brand2:#ff9a4d;--navy:#1b2a4a;
    --cram:#e0432f;--self:#2f9e44;--eng:#2f6df0;--rest:#a08d6e;--custom:#8b5cf6;--exam:#eab308;--read:#0ea5a5;
    --sh:0 8px 22px rgba(120,74,20,.10),0 2px 6px rgba(120,74,20,.05);
    --sh2:0 12px 30px rgba(180,90,20,.18)}
  @media (prefers-color-scheme:dark){:root{
    --bg:#141a2b;--card:#1e2740;--ink:#f2ead9;--muted:#a89b82;--line:#2f3d5c;--navy:#0d1526;
    --sh:0 8px 24px rgba(0,0,0,.4);--sh2:0 12px 30px rgba(0,0,0,.5)}}
  html,body{margin:0}
  body{font-family:"Outfit","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;padding-bottom:calc(74px + env(safe-area-inset-bottom))}
  .wrap{max-width:720px;margin:0 auto;padding:0 14px}
  /* header */
  header{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,var(--bg) 72%,transparent);padding:calc(12px + env(safe-area-inset-top)) 0 6px}
  .htop{display:flex;align-items:center;gap:11px;max-width:720px;margin:0 auto;padding:0 14px}
  .logo{width:44px;height:44px;border-radius:13px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:23px;
    background:linear-gradient(135deg,#ff8a2b,#e23b2e 92%);box-shadow:0 8px 18px rgba(226,59,46,.34)}
  .htxt h1{font-size:19px;margin:0;font-weight:900;letter-spacing:.5px}
  .htxt p{margin:1px 0 0;font-size:11.5px;color:var(--muted)}
  .hgear{margin-left:auto;background:var(--card);border:1px solid var(--line);border-radius:12px;width:40px;height:40px;font-size:18px;cursor:pointer;box-shadow:var(--sh);color:var(--ink)}
  /* date bar */
  .datebar{display:flex;align-items:center;gap:8px;margin:12px 0 4px}
  .datebar button{background:var(--card);border:1px solid var(--line);border-radius:12px;width:40px;height:44px;font-size:19px;cursor:pointer;box-shadow:var(--sh);color:var(--ink);flex:0 0 auto}
  .dnow{flex:1;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:7px 8px;box-shadow:var(--sh);cursor:pointer}
  .dnow b{display:block;font-size:16px;font-weight:900}
  .dnow span{font-size:11.5px;color:var(--muted)}
  .dnow.today b{color:var(--brand)}
  /* generic card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh)}
  .sec-t{font-size:13px;font-weight:800;color:var(--muted);margin:20px 4px 9px;letter-spacing:.4px;display:flex;align-items:center;gap:7px}
  .sec-t .r{margin-left:auto;font-weight:700}
  /* english must-do */
  .engbox{border-radius:18px;padding:14px 15px;margin-top:12px;color:#fff;box-shadow:var(--sh2);
    background:linear-gradient(135deg,#ff7a18,#e23b2e)}
  .engbox .et{display:flex;align-items:center;gap:9px}
  .engbox .et b{font-size:15.5px;font-weight:900}
  .engbox .et .tag{margin-left:auto;font-size:11px;font-weight:800;background:rgba(255,255,255,.22);padding:3px 9px;border-radius:20px}
  .engbox .em{font-size:12.5px;opacity:.94;margin:7px 0 11px;line-height:1.6}
  .engbox .erow{display:flex;gap:8px;flex-wrap:wrap}
  .engbox a.eb,.engbox button.eb{flex:1;min-width:120px;text-align:center;text-decoration:none;border:0;cursor:pointer;font-family:inherit;
    background:rgba(255,255,255,.95);color:#3b46a8;font-weight:800;font-size:13.5px;border-radius:12px;padding:11px 8px}
  .engbox button.eb.done{background:rgba(255,255,255,.28);color:#fff}
  .engbox .due{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .engbox .due a{text-decoration:none;color:#fff;background:rgba(255,255,255,.16);border-radius:10px;padding:6px 10px;font-size:12px;font-weight:700}
  .engbox .due a b{color:#ffe08a}
  .engbox .em b{color:#ffe08a;font-weight:900}
  .engbox .engapps{display:flex;flex-direction:column;gap:6px;margin-top:11px}
  .engbox .engapp{display:flex;align-items:center;gap:8px;text-decoration:none;background:rgba(255,255,255,.14);border-radius:10px;padding:8px 11px;color:#fff}
  .engbox .engapp .star{font-size:9.5px;font-weight:800;background:rgba(255,255,255,.9);color:#d1491f;border-radius:5px;padding:1px 5px;flex:0 0 auto}
  .engbox .engapp .en{font-size:12.5px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .engbox .engapp .es{font-size:11.5px;font-weight:700;opacity:.85;flex:0 0 auto}
  .engbox .engapp .es.due{color:#ffe08a;opacity:1;font-weight:800}
  /* task list */
  .tasks{display:flex;flex-direction:column;gap:10px;margin-top:2px}
  .task{display:flex;align-items:flex-start;gap:11px;padding:12px 13px;border-left:5px solid var(--self);
    transition:transform .2s ease,box-shadow .2s ease}
  .task:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
  .task:active{transform:translateY(0)}
  .task .tk{flex:0 0 auto;width:28px;height:28px;border-radius:9px;border:2px solid var(--line);background:transparent;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;margin-top:1px;
    transition:background-color .15s ease,border-color .15s ease,transform .1s ease}
  .task .tk:hover{transform:scale(1.08)}
  .task .tk:active{transform:scale(0.92)}
  .task.done .tk{background:var(--self);border-color:var(--self)}
  .task.done .body .tl{text-decoration:line-through;opacity:.55}
  .task .body{flex:1;min-width:0}
  .task .time{font-size:12px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums}
  .task .tl{font-size:15px;font-weight:800;margin:1px 0 0;line-height:1.35}
  .task .badge{display:inline-block;font-size:10.5px;font-weight:800;color:#fff;border-radius:7px;padding:1px 7px;margin-right:6px;vertical-align:1px}
  .task .sub{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.55}
  .task .prog{margin-top:7px}
  .task .acts{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .task .acts button{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:9px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
    transition:background-color .15s ease,transform .15s ease,box-shadow .15s ease}
  .task .acts button:hover{background:var(--line);transform:translateY(-1px)}
  .task .acts button:active{transform:translateY(0)}
  .task .acts button.p{background:var(--self);color:#fff;border-color:var(--self)}
  .task .acts button.p:hover{background:#2b8a3e;border-color:#2b8a3e;box-shadow:0 4px 12px rgba(47,158,68,.35)}
  .mini{width:34px;height:34px;border-radius:9px;flex:0 0 auto}
  .empty{text-align:center;color:var(--muted);padding:26px 16px;font-size:13.5px;line-height:1.8}
  /* progress bar */
  .bar{height:8px;border-radius:6px;background:var(--line);overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--brand),#f5a623);transition:width .3s}
  /* year header (progress tab) */
  .yhead{display:flex;align-items:center;gap:9px;margin:20px 2px 4px;padding:11px 14px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh);cursor:pointer}
  .yhead .yi{font-size:17px}
  .yhead .yn{font-weight:900;font-size:16px}
  .yhead .ypct{margin-left:auto;font-weight:900;color:var(--brand);font-size:14px}
  .yhead .ychev{color:var(--muted);font-size:13px;width:14px;text-align:center}
  /* subject cards (progress tab) */
  .subj{padding:13px 14px;margin-top:11px}
  .subj .sh{display:flex;align-items:center;gap:9px;cursor:pointer}
  .subj .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
  .subj .snm{font-weight:800;font-size:15px}
  .subj .gtag{font-size:10.5px;font-weight:800;border-radius:7px;padding:1px 7px}
  .subj .pct{margin-left:auto;font-size:13px;font-weight:900;color:var(--muted)}
  .subj .barwrap{margin-top:9px}
  .subj .chaps{margin-top:11px;display:flex;flex-direction:column;gap:2px}
  .chap{display:flex;align-items:center;gap:9px;padding:8px 4px;border-top:1px solid var(--line);font-size:13.5px}
  .chap .ck{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);cursor:pointer;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
  .chap.done .ck{background:var(--self);border-color:var(--self)}
  .chap.done span{text-decoration:line-through;opacity:.5}
  .chap span{flex:1}
  .chap .del{background:none;border:0;color:var(--muted);font-size:15px;cursor:pointer;opacity:.5}
  .subj .subadd{display:flex;gap:6px;margin-top:8px}
  .subj .subadd input{flex:1;border:1px solid var(--line);background:var(--bg);border-radius:9px;padding:8px 10px;font-size:13px;color:var(--ink);font-family:inherit}
  .subj .subadd button{border:0;background:var(--brand);color:#fff;border-radius:9px;padding:0 13px;font-weight:800;cursor:pointer}
  /* week grid */
  .wk{display:flex;flex-direction:column;gap:9px;margin-top:8px}
  .wkday{padding:11px 13px}
  .wkday .wh{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px}
  .wkday .wh .today-pill{font-size:10px;background:var(--brand);color:#fff;border-radius:20px;padding:1px 8px;font-weight:800}
  .wkday .wh .n{margin-left:auto;font-size:11.5px;color:var(--muted);font-weight:700}
  .wblk{display:flex;align-items:center;gap:9px;margin-top:8px;padding:8px 10px;border-radius:11px;background:var(--bg);cursor:pointer;border-left:4px solid var(--self)}
  .wblk .wt{font-size:11.5px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums;flex:0 0 auto;width:86px}
  .wblk .wl{font-size:13.5px;font-weight:700;flex:1;min-width:0}
  .wblk .wtype{font-size:10px;font-weight:800;color:#fff;border-radius:6px;padding:1px 6px}
  .wkday .none{font-size:12px;color:var(--muted);margin-top:7px;opacity:.8}
  /* month calendar */
  .mhead{display:flex;align-items:center;gap:8px;margin:12px 0 10px}
  .mhead button{background:var(--card);border:1px solid var(--line);border-radius:12px;width:40px;height:42px;font-size:19px;cursor:pointer;box-shadow:var(--sh);color:var(--ink);flex:0 0 auto}
  .mhead .mt{flex:1;text-align:center;font-size:17px;font-weight:900}
  .mhead .mt small{display:block;font-size:11px;color:var(--brand);font-weight:700;margin-top:1px}
  .mdow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px}
  .mdow span{text-align:center;font-size:11px;font-weight:800;color:var(--muted);padding:2px 0}
  .mdow span.we{color:var(--cram)}
  .mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .mcell{position:relative;min-height:58px;border:1px solid var(--line);background:var(--card);border-radius:12px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;padding:5px 2px 4px;font-family:inherit;color:var(--ink);box-shadow:var(--sh)}
  .mcell:active{transform:scale(.95)}
  .mcell .mnum{font-size:13.5px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .mcell.out{opacity:.34}
  .mcell.we .mnum{color:var(--cram)}
  .mcell.today{border-color:var(--brand);border-width:2px}
  .mcell.today .mnum{color:var(--brand)}
  .mcell.full{background:linear-gradient(180deg,rgba(34,160,107,.14),var(--card))}
  .mcell .mdots{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;margin-top:5px;max-width:100%}
  .mcell .mdots i{width:6px;height:6px;border-radius:50%;flex:0 0 auto}
  .mcell .msubs{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:5px;max-width:100%;min-height:14px}
  .mcell .msubs b{font-size:9px;line-height:1;color:#fff;border-radius:5px;padding:2px 4px;max-width:28px;overflow:hidden;white-space:nowrap}
  .mcell .mbrief{display:none}
  .mcell .mchk{position:absolute;top:3px;right:4px;font-size:11px;color:var(--self);font-weight:900}
  .mcell .mn{position:absolute;top:4px;right:5px;font-size:9.5px;font-weight:800;color:var(--muted);background:var(--bg);border-radius:6px;padding:0 4px;line-height:1.5}
  .mleg{display:flex;flex-wrap:wrap;gap:5px 12px;justify-content:center;margin-top:14px;font-size:11px;color:var(--muted)}
  .mleg span{display:inline-flex;align-items:center;gap:4px}
  .mleg i{width:8px;height:8px;border-radius:50%}
  .msum{margin-top:14px}
  /* 桌機放大：螢幕夠寬時，版面加寬、月曆格子與字體放大 */
  @media(min-width:820px){
    .wrap{max-width:1040px}
    .htop{max-width:1040px}
    .mgrid,.mdow{gap:8px}
    .mdow span{font-size:14px;padding:4px 0}
    .mhead .mt{font-size:22px}
    .mhead button{width:46px;height:48px;font-size:22px}
    .mcell{min-height:118px;border-radius:14px;padding:8px 5px 7px}
    .mcell .mnum{font-size:18px}
    .mcell .mdots{gap:5px;margin-top:8px}
    .mcell .mdots i{width:8px;height:8px}
    .mcell .msubs{gap:4px;margin-top:8px;min-height:20px}
    .mcell .msubs b{font-size:12px;max-width:52px;padding:3px 7px}
    .mcell .mn,.mcell .mchk{font-size:12px}
    .mleg{font-size:12.5px;gap:6px 16px;margin-top:18px}
  }
  @media(min-width:1120px){
    .wrap{max-width:1180px}
    .htop{max-width:1180px}
    .mcell{min-height:134px}
    .mcell .msubs b{max-width:64px}
  }
  .goalcard{padding:14px 15px;margin-top:12px}
  .goalcard h4{margin:0 0 8px;font-size:14.5px;display:flex;align-items:center;gap:7px}
  .goalgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .goalstat{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:9px 8px;text-align:center}
  .goalstat b{display:block;font-size:17px;color:var(--brand)}
  .goalstat span{display:block;font-size:10.5px;color:var(--muted);margin-top:2px}
  .subsum{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .subsum span{font-size:12px;background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:4px 9px;font-weight:700;color:var(--muted)}
  .subsum b{color:var(--ink)}
  .monthlist{display:flex;flex-direction:column;gap:7px;margin-top:12px}
  .mday{display:grid;grid-template-columns:42px 1fr auto;gap:9px;align-items:center;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:9px 10px;color:var(--ink);font-family:inherit;text-align:left;cursor:pointer}
  .mday .date{font-size:12px;font-weight:900;color:var(--brand);font-variant-numeric:tabular-nums}
  .mday .main{font-size:13px;font-weight:800;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mday .meta{font-size:11px;font-weight:800;color:var(--muted)}
  @media(max-width:420px){.goalgrid{gap:6px}.goalstat{padding:8px 4px}.goalstat b{font-size:15px}.goalstat span{font-size:10px}.subsum span{font-size:11px}.mday{grid-template-columns:38px 1fr auto;gap:7px;padding:8px}}
  .weekdash{padding:14px 15px;margin-bottom:11px}
  .weekdash h4{margin:0 0 8px;font-size:14.5px}
  .weekdash .wline{font-size:12.5px;color:var(--muted);line-height:1.6;margin-top:8px}
  .weekdash .wline b{color:var(--ink)}
  .targetrow{display:grid;grid-template-columns:96px 1fr 82px 70px 42px;gap:8px;align-items:center;margin-top:8px}
  .targetrow input{text-align:center}
  .targetrow input.name{text-align:left}
  .targetrow button{width:42px;height:38px;border:0;border-radius:10px;background:var(--bg);color:var(--cram);font-size:16px;cursor:pointer}
  .targethint{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:6px}
  @media(max-width:520px){.targetrow{grid-template-columns:1fr 1fr 70px 58px 38px}.targetrow .wide{grid-column:1 / span 2}.targetrow button{width:38px}}
  /* buttons */
  .btn{display:block;width:100%;border:0;border-radius:13px;padding:13px;font-size:14.5px;font-weight:800;cursor:pointer;font-family:inherit;background:var(--brand);color:#fff;box-shadow:0 8px 18px rgba(255,106,26,.32)}
  .btn.ghost{background:var(--card);color:var(--brand);border:1px solid var(--line);box-shadow:var(--sh)}
  .btn.mt{margin-top:12px}
  /* fab */
  .fab{position:fixed;right:calc(16px + env(safe-area-inset-right));bottom:calc(84px + env(safe-area-inset-bottom));z-index:45;
    width:56px;height:56px;border-radius:50%;border:0;background:linear-gradient(135deg,#ff8a2b,#e23b2e);color:#fff;font-size:28px;cursor:pointer;
    box-shadow:0 10px 24px rgba(226,59,46,.45);display:flex;align-items:center;justify-content:center}
  /* bottom nav */
  nav{position:fixed;left:0;right:0;bottom:0;z-index:44;background:var(--card);border-top:1px solid var(--line);
    padding:6px 0 calc(6px + env(safe-area-inset-bottom));display:flex}
  nav button{flex:1;background:none;border:0;cursor:pointer;color:var(--muted);font-family:inherit;font-size:10.5px;font-weight:700;padding:4px 0;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button .ni{width:22px;height:22px;display:block;margin:0 auto;stroke-width:2.2}
  nav button.on{color:var(--brand)}
  /* settings rows */
  .set{padding:4px 2px}
  .setrow{padding:14px 15px;margin-top:11px}
  .setrow h4{margin:0 0 3px;font-size:14.5px}
  .setrow p{margin:0;font-size:12px;color:var(--muted);line-height:1.65}
  .setrow label.chk{display:flex;align-items:center;gap:10px;padding:9px 0;font-size:13.5px;border-top:1px solid var(--line);cursor:pointer}
  .setrow label.chk:first-of-type{border-top:0}
  .setrow input[type=checkbox]{width:20px;height:20px;accent-color:var(--brand)}
  .enggrp{border:1px solid var(--line);border-radius:12px;margin-top:8px;overflow:hidden;background:var(--bg)}
  .enggrp>summary{cursor:pointer;padding:10px 12px;font-size:13.5px;font-weight:800;list-style:none;display:flex;align-items:center;gap:8px}
  .enggrp>summary::-webkit-details-marker{display:none}
  .enggrp>summary::before{content:'▸';color:var(--muted);font-size:12px}
  .enggrp[open]>summary::before{content:'▾'}
  .enggrp>summary b{margin-left:auto;font-size:11.5px;color:var(--brand);font-weight:800}
  .enggrp .chk{padding:9px 12px}
  .setrow .field{display:flex;flex-direction:column;gap:5px;margin-top:10px}
  .setrow .field label{font-size:12px;font-weight:700;color:var(--muted)}
  .setrow input[type=text],.setrow input[type=date],.setrow input[type=number],.setrow textarea,.setrow select{border:1px solid var(--line);background:var(--bg);border-radius:10px;padding:10px 11px;font-size:14px;color:var(--ink);font-family:inherit;width:100%}
  .setrow textarea{min-height:64px;resize:vertical;line-height:1.6}
  .tip{background:#fff7e6;border:1px solid #ffe0a3;border-radius:14px;padding:13px 14px;font-size:12.5px;line-height:1.85;color:#6b551a;margin-top:12px}
  @media (prefers-color-scheme:dark){.tip{background:#2a2412;border-color:#4a3d17;color:#e5cf8f}}
  .tip b{font-weight:800}

  .ov{position:fixed;inset:0;background:rgba(20,26,45,.55);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);z-index:60;display:none;align-items:flex-end;justify-content:center}
  .ov.show{display:flex}
  .sheet{background:var(--card);width:100%;max-width:560px;border-radius:22px 22px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow:auto;animation:up .25s ease}
  @media(min-width:560px){.ov{align-items:center}.sheet{border-radius:22px}}
  @keyframes up{from{transform:translateY(24px);opacity:.4}to{transform:none;opacity:1}}
  .sheet h3{margin:2px 0 14px;font-size:18px;font-weight:900;text-align:center}
  .fld{margin-bottom:13px}
  .fld label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
  .fld input,.fld select,.fld textarea{width:100%;border:1px solid var(--line);background:var(--bg);border-radius:11px;padding:11px 12px;font-size:15px;color:var(--ink);font-family:inherit}
  .fld textarea{min-height:60px;line-height:1.6}
  .row2{display:flex;gap:10px}.row2>*{flex:1}
  /* 友善時間選擇 */
  .tsel{display:flex;align-items:center;gap:8px}
  .tsel select{flex:1;text-align:center;text-align-last:center;font-size:17px;font-weight:800;padding:12px 10px;border:1px solid var(--line);background:var(--bg);border-radius:12px;color:var(--ink);font-family:inherit}
  .tsel .cln{font-size:20px;font-weight:900;color:var(--muted);flex:0 0 auto}
  .dur{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:9px}
  .dur span{font-size:12px;font-weight:700;color:var(--muted);margin-right:2px}
  .dur button{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .dur button:active{background:var(--brand);color:#fff;border-color:var(--brand)}
  .daypick{display:flex;gap:5px;flex-wrap:wrap}
  .daypick button{flex:1;min-width:38px;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:9px;padding:9px 0;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .daypick button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .typepick{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
  .typepick button{border:2px solid var(--line);background:var(--bg);border-radius:11px;padding:10px 4px;font-size:12.5px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--ink);display:flex;flex-direction:column;align-items:center;gap:3px}
  .typepick button .ti{font-size:19px}
  .typepick button.on{border-color:var(--brand);background:rgba(255,106,26,.12)}
  .sbtns{display:flex;gap:10px;margin-top:6px}
  .sbtns button{flex:1;border:0;border-radius:13px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
  .sbtns .ok{background:var(--brand);color:#fff}
  .sbtns .cc{background:var(--bg);color:var(--muted);border:1px solid var(--line)}
  .sbtns .rm{background:none;color:var(--cram);flex:0 0 auto;padding:13px 16px}
  .tstat{display:flex;align-items:center;gap:14px;padding:14px 16px;margin-top:12px;border-radius:16px;background:var(--card);border:1px solid var(--line);box-shadow:var(--sh)}
  .tstat.alldone{background:linear-gradient(135deg,#2f9e44,#16a34a);color:#fff;border-color:transparent}
  .tstat .ring{--p:0;width:58px;height:58px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:conic-gradient(var(--brand) calc(var(--p)*1%),var(--line) 0)}
  .tstat.alldone .ring{background:conic-gradient(#fff calc(var(--p)*1%),rgba(255,255,255,.4) 0)}
  .tstat .ring span{width:44px;height:44px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:13.5px;font-weight:900;color:var(--ink)}
  .tstat.alldone .ring span{background:#16a34a;color:#fff}
  .tstat .ti{min-width:0}
  .tstat .ti b{display:block;font-size:15.5px}
  .tstat .ti span{font-size:12px;color:var(--muted);line-height:1.5}
  .tstat.alldone .ti span{color:rgba(255,255,255,.92)}
  .tstat .chk{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
  .tstat .chk i{font-size:11px;font-style:normal;padding:2px 8px;border-radius:20px;background:var(--bg);color:var(--muted);font-weight:700}
  .tstat.alldone .chk i{background:rgba(255,255,255,.18);color:#fff}
  .tstat .chk i.ok{color:var(--self)}.tstat.alldone .chk i.ok{color:#fff}
  .tstat .allbtn{margin-top:9px;border:0;border-radius:10px;padding:8px 14px;font-size:12.5px;font-weight:800;cursor:pointer;font-family:inherit;background:var(--self);color:#fff}
  .qgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .qgrid button{display:flex;flex-direction:column;align-items:center;gap:5px;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:14px;padding:15px 8px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
  .qgrid button:active{background:rgba(255,106,26,.12);border-color:var(--brand)}
  .qgrid button .qi{font-size:26px;line-height:1}
  .rankcard{display:flex;align-items:center;gap:13px;padding:14px 16px;margin-top:14px;border-radius:16px;
    background:linear-gradient(135deg,#1b2a4a,#31456e);color:#fff;box-shadow:var(--sh2);border:2px solid var(--brand);position:relative;overflow:hidden}
  .rankcard .rke{font-size:38px;line-height:1;flex:0 0 auto}
  .rankcard .rkt{flex:1;min-width:0}
  .rankcard .rkt b{display:block;font-size:16.5px;color:#ffcf8a;font-weight:900}
  .rankcard .rkt>span{font-size:12px;opacity:.92;line-height:1.5}
  .rankcard .xpbar{height:8px;border-radius:99px;background:rgba(255,255,255,.18);overflow:hidden;margin:8px 0 5px}
  .rankcard .xpbar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#ffb347,#ff6a1a);transition:width .5s}
  .rankcard .xpline{font-size:12px;opacity:.95}
  .rankcard .xpline b{color:#fff}
  .jgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:10px;perspective:1000px}
  .jutsu{text-align:center;border-radius:13px;padding:11px 6px;border:1.5px solid var(--line);
    transition:transform .3s cubic-bezier(.175,.885,.32,1.275),box-shadow .3s ease,background-color .3s ease;
    cursor:pointer;box-shadow:var(--sh)}
  .jutsu.on{background:linear-gradient(135deg,#fff4e0,#ffe6c2);border-color:var(--brand)}
  .jutsu.on:hover{transform:translateY(-5px) rotate(2deg);box-shadow:0 8px 20px rgba(255,106,26,.25)}
  .jutsu.on:active{transform:scale(.95)}
  .jutsu.off{background:rgba(0,0,0,.03);border-style:dashed;opacity:.6}
  @media (prefers-color-scheme:dark){.jutsu.off{background:rgba(255,255,255,.03)}}
  .jutsu .je{font-size:26px;line-height:1.1;transition:transform .2s}
  .jutsu.on:hover .je{animation:jutsuBounce .6s infinite ease-in-out}
  @keyframes jutsuBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .jutsu .jn{font-size:12.5px;font-weight:800;margin-top:3px;color:var(--ink)}
  .jutsu.off .jn{color:#b8ad97}
  .jutsu .jh{font-size:10.5px;margin-top:2px;line-height:1.35}
  .jutsu.on .jh{color:var(--brand);font-weight:700}
  .jutsu.off .jh{color:#a89e88}
  .xpsrc{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
  .xpsrc span{font-size:12px;background:#fdf1df;border:1px solid #f0dcbf;border-radius:20px;padding:4px 11px;font-weight:600;color:#8a5a1a}
  .xpsrc b{color:var(--brand)}
  .streak{display:flex;align-items:center;gap:11px;padding:13px 15px;margin-top:12px;border-radius:16px;
    background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;box-shadow:var(--sh2)}
  .streak .big{font-size:30px;font-weight:900;line-height:1}
  .streak .st{font-size:12.5px;opacity:.95;line-height:1.5}
  .hide{display:none!important}
  .quote-card{background:linear-gradient(135deg,#fff7e6,#fff0d4);border:1px dashed var(--brand);border-radius:14px;padding:10px 14px;margin-top:10px;font-size:13px;line-height:1.5;color:#b25300;display:flex;align-items:center;gap:8px;box-shadow:var(--sh)}
  @media(prefers-color-scheme:dark){.quote-card{background:linear-gradient(135deg,#2c1a0e,#1c1109);border-color:var(--brand2);color:#ffd6b3}}
  .quote-card .qi{font-size:20px}
  .quote-card b{font-weight:800}
  .timer-card{padding:14px 16px;margin-top:11px;display:flex;align-items:center;justify-content:between;gap:15px;border:1px solid var(--line);transition:border-color .3s ease,box-shadow .3s ease}
  .timer-card.glowing{border-color:var(--brand);animation:chakraGlow 2s infinite ease-in-out}
  @keyframes chakraGlow{0%,100%{box-shadow:0 0 8px rgba(255,106,26,.25)}50%{box-shadow:0 0 20px rgba(255,106,26,.6)}}
  .timer-left{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:0 0 auto}
  .timer-time{font-size:28px;font-weight:900;color:var(--ink);font-family:'Outfit',sans-serif;font-variant-numeric:tabular-nums}
  .timer-label{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}
  .timer-right{flex:1;display:flex;flex-direction:column;gap:8px}
  .timer-controls{display:flex;gap:6px}
  .timer-btn{flex:1;border:0;border-radius:9px;padding:8px 0;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit}
  .timer-btn.start{background:var(--brand);color:#fff}
  .timer-btn.pause{background:#8a5a1a;color:#fff}
  .timer-btn.reset{background:var(--bg);color:var(--muted);border:1px solid var(--line)}
  .timer-presets{display:flex;gap:5px}
  .timer-preset-btn{flex:1;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:6px;padding:4px 0;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
  .timer-preset-btn:hover{background:var(--line)}
  .hm-card{padding:14px 15px;margin-top:12px}
  .hm-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-top:10px;justify-content:center}
  @media(min-width:480px){.hm-grid{grid-template-columns:repeat(15,1fr);gap:6px}}
  @media(min-width:600px){.hm-grid{grid-template-columns:repeat(20,1fr);gap:6px}}
  .hm-cell{aspect-ratio:1/1;border-radius:4px;background:var(--line);position:relative;cursor:pointer;transition:transform .15s ease}
  .hm-cell:hover{transform:scale(1.25);z-index:10;outline:1.5px solid var(--brand)}
  .hm-cell.level-1{background:#ffe0b2}
  .hm-cell.level-2{background:#ffb74d}
  .hm-cell.level-3{background:#ff9800}
  .hm-cell.level-4{background:#f57c00}
  .hm-cell.level-5{background:#e65100}
  @media(prefers-color-scheme:dark){.hm-cell{background:#222b45}
    .hm-cell.level-1{background:#4a2818}
    .hm-cell.level-2{background:#8c431d}
    .hm-cell.level-3{background:#c65e23}
    .hm-cell.level-4{background:#ff7a2e}
    .hm-cell.level-5{background:#ff9d61}}
  .hm-cell::after{content:attr(data-tip);position:absolute;bottom:130%;left:50%;transform:translateX(-50%) scale(0);background:rgba(20,26,45,.95);color:#fff;padding:5px 8px;border-radius:6px;font-size:10px;font-weight:700;white-space:nowrap;pointer-events:none;transition:transform .15s ease;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:100}
  .hm-cell:hover::after{transform:translateX(-50%) scale(1)}
  .chart-card{padding:14px 15px;margin-top:12px}
  .chart-bar{height:16px;border-radius:8px;display:flex;overflow:hidden;background:var(--line);margin-top:10px}
  .chart-segment{height:100%;transition:width .3s ease}
  .chart-legend{display:flex;flex-wrap:wrap;gap:8px 12px;margin-top:11px;justify-content:center}
  .chart-leg-item{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--muted)}
  .chart-leg-dot{width:9px;height:9px;border-radius:50%}
  footer{text-align:center;color:var(--muted);font-size:11px;margin:26px 0 8px;line-height:1.7}
  /* ===== 列印 / 存 PDF ===== */
  #printHost{display:none}
  @media print{
    html,body{margin:0;padding:0;background:#fff!important;color:#000!important}
    body>*{display:none!important}
    body>#printHost{display:block!important}
    @page{size:A4;margin:10mm}
    .p-wrap{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;color:#000}
    .p-h1{font-size:20px;font-weight:800;text-align:center;margin:0 0 2px}
    .p-sub{font-size:12px;text-align:center;color:#555;margin:0 0 12px}
    .p-cal{width:100%;border-collapse:collapse;table-layout:fixed}
    .p-cal th{font-size:12px;border:1px solid #bbb;padding:4px;background:#f3f3f3}
    .p-cal td{border:1px solid #bbb;vertical-align:top;height:92px;padding:3px 4px;font-size:10px}
    .p-cal td .pd{font-size:12px;font-weight:800;line-height:1.2}
    .p-cal td.we .pd{color:#c0392b}
    .p-cal td.out{background:#fafafa}
    .p-cal td.out .pd{color:#ccc}
    .p-tag{display:inline-block;font-size:9px;border:1px solid #999;border-radius:3px;padding:0 3px;margin:1px 2px 0 0;line-height:1.5}
    .p-wk{width:100%;border-collapse:collapse}
    .p-wk th,.p-wk td{border:1px solid #bbb;padding:6px 8px;font-size:12px;text-align:left;vertical-align:top}
    .p-wk th{background:#f3f3f3;width:64px;text-align:center}
    .p-blk{margin:2px 0}
    .p-grade{font-size:15px;font-weight:800;margin:14px 0 5px;border-bottom:2px solid #333;padding-bottom:2px}
    .p-subj{margin:7px 0;page-break-inside:avoid}
    .p-subj .snm{font-size:13px;font-weight:700;margin-bottom:3px}
    .p-chaps{display:grid;grid-template-columns:1fr 1fr;gap:1px 16px}
    .p-chap{font-size:11px;padding:1px 0}
    .p-box{display:inline-block;width:11px;height:11px;border:1.3px solid #333;border-radius:2px;margin-right:5px;vertical-align:-1px;text-align:center;line-height:10px;font-size:9px}
    .p-foot{margin-top:14px;font-size:10px;color:#777;text-align:center}
  }
</style>

      <span><i style="background:var(--cram)"></i>道場</span>
      <span><i style="background:var(--self)"></i>修行</span>

      <span><i style="background:var(--exam)"></i>試煉</span>

    </div>
    <div id="progList"></div>

  <!-- ============ 設定 ============ -->

function load(){try{const j=JSON.parse(localStorage.getItem(KEY));if(j&&j.subjects)return norm(j);}catch(e){} return seed();}
function norm(j){ j.subjects=j.subjects||[]; j.routine=j.routine||[]; j.events=j.events||{}; j.checks=j.checks||{}; j.recentSubj=j.recentSubj||[];
  j.plan=j.plan||defaultPlan(); j.plan.targets=j.plan.targets||[]; j.plan.restDays=j.plan.restDays||[]; if(!j.plan.start)j.plan.start=defaultPlan().start; if(!j.plan.end)j.plan.end=defaultPlan().end; if(!j.plan.dailyMax)j.plan.dailyMax=180; if(!('excludeWeekends'in j.plan))j.plan.excludeWeekends=true;
  j.plan.targets.forEach(t=>{if(!t.kind)t.kind='subject'; if(t.kind==='custom'&&!t.unit)t.unit='項';});
  j.eng=j.eng||{}; j.eng.apps=j.eng.apps||{}; if(!('note'in j.eng))j.eng.note=''; if(!('primary'in j.eng))j.eng.primary=null;
  j.plannerJutsu=j.plannerJutsu||[]; j.xpLedger=j.xpLedger||{}; j.ninjaBase=j.ninjaBase||{};
  j.subjects.forEach(s=>{
    s.chaps=(s.chaps||[]).map(c=>typeof c==='string'?{n:c,done:false}:c);
    if(!s.grade){ s.grade = s.group==='預習'?'國二' : '國一'; if(s.group&&!('tag'in s))s.tag=s.group; }
    if(!('tag'in s))s.tag='';
    if(!('emoji'in s))s.emoji=SUBJ_EMOJI[s.cat]||'';
  }); return j; }

function parseDay(s){const d=new Date((s||ymd(new Date()))+'T00:00:00');d.setHours(0,0,0,0);return d;}
function inPlan(d){const p=S.plan||defaultPlan(), x=ymd(d);return x>=p.start&&x<=p.end;}
function isRestDay(d){const p=S.plan||defaultPlan(), dow=d.getDay();return (p.excludeWeekends&&(dow===0||dow===6))||(p.restDays||[]).includes(dow);}
function isStudyDay(d){return inPlan(d)&&!isRestDay(d);}
function eachDate(a,b,fn){const d=parseDay(a), e=parseDay(b); for(;d<=e;d.setDate(d.getDate()+1))fn(new Date(d));}
function dateSpanLabel(a,b){return `${(+a.split('-')[1])}/${(+a.split('-')[2])}–${(+b.split('-')[1])}/${(+b.split('-')[2])}`;}
function minsOf(b){const s=(b.start||'').split(':').map(Number), e=(b.end||'').split(':').map(Number); if(s.length<2||e.length<2||isNaN(s[0])||isNaN(e[0]))return 0; return Math.max(0,e[0]*60+e[1]-s[0]*60-s[1]);}
function studyBlocks(blks){return blks.filter(b=>b.type!=='rest');}
function doneStudyBlocks(key,blks){return studyBlocks(blks).filter(b=>isChecked(key,b._k));}
function targetRows(){return (S.plan&&S.plan.targets||[]).filter(t=>Number(t.target)>0&&(t.kind==='custom'||subjOf(t.subjectId)));}
function targetInfo(t){
  if(t.kind==='custom'){
    const target=Number(t.target)||0, done=Number(t.done)||0, unit=t.unit||'項', name=t.name||'自訂目標';
    return {kind:'custom',name,unit,target,done,total:target,pct:target?Math.min(100,Math.round(done/target*100)):0,remain:Math.max(0,target-done),label:`${name} ${done}/${target}${unit}`};
  }
  const s=subjOf(t.subjectId), total=s?s.chaps.length:0, done=s?s.chaps.filter(c=>c.done).length:0, target=Math.min(Number(t.target)||0,total||Number(t.target)||0);
  return {kind:'subject',s,name:s?s.name:'科目',unit:'章',target,done,total,pct:target?Math.min(100,Math.round(done/target*100)):0,remain:Math.max(0,target-done),label:`${s?(s.emoji||'')+s.name:'科目'} ${done}/${target}章`};
}
function goalStats(a,b){
  const p=S.plan||defaultPlan(); let days=0, doneDays=0, planned=0, done=0, mins=0; const subj={};
  eachDate(a,b,d=>{
    if(!isStudyDay(d))return;
    days++;
    const key=ymd(d), blks=studyBlocks(blocksFor(d));
    planned+=blks.length; done+=doneStudyBlocks(key,blks).length;
    if(dayProgress(key,blks).all)doneDays++;
    blks.forEach(b=>{
      if(!b.subjectId)return;
      const s=subjOf(b.subjectId); if(!s)return;
      const x=subj[b.subjectId]||(subj[b.subjectId]={s,planned:0,done:0,mins:0});
      x.planned++; x.mins+=minsOf(b); if(isChecked(key,b._k))x.done++;
    });
    doneStudyBlocks(key,blks).forEach(b=>{mins+=minsOf(b);});
  });
  const targets=targetRows().map(targetInfo);
  const targetNeed=targets.reduce((n,t)=>n+t.remain,0);
  const leftDays=(()=>{let n=0;eachDate(ymd(new Date())>p.start?ymd(new Date()):p.start,p.end,d=>{if(isStudyDay(d))n++;});return n;})();
  return {days,doneDays,planned,done,mins,subj:Object.values(subj).sort((a,b)=>b.done-a.done),targets,targetNeed,leftDays,dailyNeed:leftDays?targetNeed/leftDays:0};
}
function monthBriefFor(blks){
  const rows=[]; const seen=new Set();
  blks.forEach(b=>{if(!b.subjectId||seen.has(b.subjectId))return; const s=subjOf(b.subjectId); if(!s)return; seen.add(b.subjectId); rows.push({s,b});});
  const chips=rows.slice(0,3).map(x=>`<b style="background:${x.s.color||'var(--brand)'}">${esc((x.s.name||'科').slice(0,2))}</b>`).join('');
  const first=rows[0]; let brief='';
  if(first){const chap=first.b.chapter||(first.s.chaps.find(c=>!c.done)||{}).n||''; brief=chap?`${first.s.name}：${chap}`:first.s.name;}
  else if(blks.length){brief=(blks[0].label||((TYPES[blks[0].type]||TYPES.custom).n));}
  return {chips,brief};
}

/* ninja_xp_v1 為同網域各App共享的「忍者經驗值錢包」，任何App答對都灌進來 */
const Ninja=(function(){
  var K='ninja_xp_v1';
  function load(){try{return JSON.parse(localStorage.getItem(K))||{}}catch(e){return{}}}
  function get(){var w=load();w.xp=w.xp||0;w.bySrc=w.bySrc||{};w.correct=w.correct||0;w.units=w.units||0;w.jutsu=w.jutsu||[];w.seen=w.seen||{};return w;}
  function put(w){w.ts=Date.now();try{localStorage.setItem(K,JSON.stringify(w))}catch(e){}}
  function gain(n,app,o){o=o||{};var w=get();w.xp+=n;w.bySrc[app]=(w.bySrc[app]||0)+n;w.correct+=(o.correct||0);w.units+=(o.unit||0);put(w);return w;}
  function backfill(app,xp,o){var w=get();if(w.seen[app])return w;o=o||{};w.xp+=xp;w.bySrc[app]=(w.bySrc[app]||0)+xp;w.correct+=(o.correct||0);w.units+=(o.unit||0);w.seen[app]=1;put(w);return w;}
  return {get:get,put:put,gain:gain,backfill:backfill};
})();

function triggerConfetti() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  let w = canvas.width = window.innerWidth;
  let h = canvas.height = window.innerHeight;
  const particles = [];
  const colors = ['#ff6a1a', '#ff9a4d', '#22a06b', '#2f6df0', '#eab308', '#8b5cf6'];
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * -h - 20,
      size: Math.random() * 8 + 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: Math.random() * 4 - 2,
      vy: Math.random() * 5 + 4,
      rotation: Math.random() * Math.PI,
      rotationSpeed: Math.random() * 0.1 - 0.05
    });
  }
  const startTime = Date.now();
  function update() {
    ctx.clearRect(0, 0, w, h);
    let active = false;
    particles.forEach(p => {
      p.y += p.vy;
      p.x += p.vx;
      p.rotation += p.rotationSpeed;
      if (p.y < h) {
        active = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        ctx.restore();
      }
    });
    if (active && Date.now() - startTime < 3000) {
      requestAnimationFrame(update);
    } else {
      canvas.remove();
    }
  }
  update();
}

    if(P.total===0) break;
    if(P.all){n++; d.setDate(d.getDate()-1);} else break;
  }
  return n;
}

function playChakraBeep() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, idx) => {
      setTimeout(() => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.35);
      }, idx * 120);
    });
  } catch(e) {}
}

function blocksFor(d){
  const dow=d.getDay(), key=ymd(d);
  const out=[];
  // eng 類型的區塊與「每日英語」卡共用同一個打勾狀態（eng_日期），不會重複計算
  S.routine.forEach(r=>{ if(r.days.includes(dow)) out.push({...r,_k:r.type==='eng'?('eng_'+key):('r_'+r.id),_src:'routine'}); });
  (S.events[key]||[]).forEach(e=> out.push({...e,_k:e.type==='eng'?('eng_'+key):('e_'+e.id),_src:'event'}) );
  out.sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  return out;
}

function dayProgress(key,blks){

  const nb=blks.filter(b=>b.type!=='eng'&&b.type!=='rest');
  const total=nb.length+(engReq?1:0);
  const done=nb.filter(b=>isChecked(key,b._k)).length+(engDone?1:0);
  return {total,done,all:total>0&&done===total,engReq,engDone,nb};

function taskCard(b,key){

    const focus = b.chapter ? `　🎯 本次：<b>${esc(b.chapter)}</b>${tgt&&tgt.done?' ✓':''}` : (nextC?`　▶ 下一章：<b>${esc(nextC.n)}</b>`:'　🎉 已全部完成');

      <div class="prog"><div class="bar"><i style="width:${tt?Math.round(dd/tt*100):0}%"></i></div></div>`;
  }
  if(b.note)subline+=`<div class="sub">📝 ${esc(b.note)}</div>`;

function readLS(k){try{return JSON.parse(localStorage.getItem(k))||{}}catch(e){return{}}}
/* 讀各英語 App 進度（同網域才有值）→ {due:待辦數, text:顯示字串} */
function engStat(a){
  try{
    if(a.kind==='vocab'){
      const S2=readLS(a.key), srs=S2.srs||{}, now=Date.now();
      const learned=Object.keys(srs).length;
      if(!learned)return{due:0,text:'尚未開始'};
      const due=Object.keys(srs).reduce((n,k)=>{const e=srs[k];return n+((e&&e.due&&e.due<=now)?1:0);},0);
      return{due, text: due? `待複習 ${due} 字`:`已學 ${learned}・複習完 ✓`};
    }
    if(a.kind==='qbank'){
      const S2=readLS(a.key), rec=S2.rec||{}, wr=(S2.wrong||[]);
      const done=Object.keys(rec).length, nwr=wr.length;
      if(!done&&!nwr)return{due:0,text:'尚未開始'};
      return{due:nwr, text: nwr? `錯題 ${nwr} 題`:`作答 ${done} 題 ✓`};
    }
    if(a.kind==='exam'){
      const wr=readLS(a.pfx+'_wrong'), un=readLS(a.pfx+'_units');
      const nwr=Object.keys(wr).length, nu=Object.keys(un).length;
      if(!nwr&&!nu)return{due:0,text:'尚未開始'};
      return{due:nwr, text: nwr? `錯題 ${nwr}`:`完成 ${nu} 單元 ✓`};
    }
    if(a.kind==='conv'){
      const S2=readLS(a.key), cards=S2.cards||{};
      const pr=Object.keys(cards).length;
      return{due:0, text: pr? `已練 ${pr} 句`:''};
    }
  }catch(e){}
  return{due:0,text:''};
}

  grades.forEach(g=>{const subs=S.subjects.filter(s=>s.grade===g); if(!subs.length)return; body+=`<div class="p-grade">${g}</div>`+subs.map(subjBlock).join('');});
  const other=S.subjects.filter(s=>!grades.includes(s.grade)); if(other.length)body+=`<div class="p-grade">其他</div>`+other.map(subjBlock).join('');
  const tg=(S.plan&&S.plan.targets||[]).filter(t=>Number(t.target)>0).map(t=>`<div class="p-chap"><span class="p-box"></span>${esc(targetInfo(t).label)}</div>`).join('');
  if(!body&&!tg)body='<div style="color:#999">尚無科目或目標，請先到設定載入課程範本、或新增總目標項目。</div>';
  return `<div class="p-wrap">
    <div class="p-h1">學習進度打勾清單</div>
    <div class="p-sub">學生：${esc(S.student||'')}　可手動打勾追蹤</div>
    ${tg?`<div class="p-grade">總目標項目</div>${tg}`:''}
    ${body}
    <div class="p-foot">火影修行計畫・進度清單</div>
  </div>`;
}

/* ================= 週課表 ================= */
function renderWeek(){
  const g=document.getElementById('weekGrid'); const todayDow=new Date().getDay();
  const now=new Date(); now.setHours(0,0,0,0);
  const mon=new Date(now); mon.setDate(now.getDate()-((now.getDay()+6)%7));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const ws=goalStats(ymd(mon),ymd(sun));
  const wpct=ws.planned?Math.round(ws.done/ws.planned*100):0;
  const subjHtml=ws.subj.slice(0,5).map(x=>`<span>${x.s.emoji||''}<b>${esc(x.s.name)}</b> ${x.done}/${x.planned}</span>`).join('')||'<span>本週尚無科目任務</span>';
  let h=`<div class="card weekdash">
    <h4>📊 本週進度 ${dateSpanLabel(ymd(mon),ymd(sun))}</h4>
    <div class="bar"><i style="width:${wpct}%"></i></div>
    <div class="goalgrid">
      <div class="goalstat"><b>${wpct}%</b><span>任務完成率</span></div>
      <div class="goalstat"><b>${ws.doneDays}/${ws.days}</b><span>有效學習日</span></div>
      <div class="goalstat"><b>${ws.targetNeed}</b><span>總目標剩餘量</span></div>
    </div>
    <div class="subsum">${subjHtml}</div>
    <div class="wline">依目前總目標，剩餘有效學習日約 <b>${ws.leftDays}</b> 天，平均每天要推進 <b>${ws.dailyNeed.toFixed(1)}</b> 個目標量。</div>
  </div>`;
  for(let dw=1;dw<=7;dw++){ const dow=dw%7; // 週一..週日
    const dayDate=new Date(mon); dayDate.setDate(mon.getDate()+dw-1);
    const blks=S.routine.filter(r=>r.days.includes(dow)).sort((a,b)=>(a.start||'').localeCompare(b.start||''));
    const restNote=isRestDay(dayDate)?'<span class="today-pill" style="background:var(--rest)">休息日</span>':'';
    h+=`<div class="card wkday"><div class="wh">${DAYW[dow]}${dow===todayDow?'<span class="today-pill">今天</span>':''}${restNote}<span class="n">${blks.length?blks.length+' 個時段':''}</span></div>`;
    if(!blks.length)h+='<div class="none">— 沒有安排 —</div>';
    else h+=blks.map(r=>{const T=TYPES[r.type]||TYPES.custom;const s=r.subjectId?subjOf(r.subjectId):null;const lbl=r.label||(s?s.name:T.n);
      const chap=r.chapter?`・${r.chapter}`:(s&&s.chaps.find(c=>!c.done)?`・${s.chaps.find(c=>!c.done).n}`:'');
      return `<div class="wblk" style="border-left-color:${T.c}" onclick="openBlock(S.routine.find(x=>x.id==='${r.id}'))"><span class="wt">${r.start}–${r.end}</span><span class="wl">${s?(s.emoji||'')+' ':''}${esc(lbl)}${chap?`<small style="display:block;color:var(--muted);font-weight:600">${esc(chap)}</small>`:''}</span><span class="wtype" style="background:${T.c}">${T.i}</span></div>`;}).join('');
    h+='</div>';
  }
  g.innerHTML=h;
}

function renderProg(){

  const byYear=y=>S.subjects.filter(s=>s.grade===y);
  const opct=tt?Math.round(td/tt*100):0;

  const ri=rankInfo();
  const rkpct=ri.nx?Math.round(ri.into/ri.span*100):100;
  st.innerHTML=`<div class="rankcard">
      <div class="rke">${ri.r.e}</div>
      <div class="rkt"><b>忍者等級：${ri.r.n}</b><span>${ri.r.d}</span>

  </div>`;
  const list=document.getElementById('progList');
  const YICON={'國一':'1️⃣','國二':'2️⃣','國三':'3️⃣'};

  const q=searchEl?searchEl.value.trim().toLowerCase():'';
  let h='';
  if(!S.subjects.length){
    h+=`<div class="card empty" style="margin-top:14px">還沒有任何科目 🍃<br>可以一鍵載入國中三年課綱範本，再自行修改。<br><button class="btn mt" style="max-width:280px;margin:12px auto 0" onclick="loadFramework()">📚 載入國中三年科目範本</button></div>`;
  }
  YEARS.forEach(y=>{
    let arr=byYear(y).slice().sort((a,b)=>(SUBORD.indexOf(a.cat)+99*(a.cat==null))-(SUBORD.indexOf(b.cat)+99*(b.cat==null)));
    if(q){
      arr=arr.filter(s=>{
        const matchesName=s.name.toLowerCase().includes(q);
        const matchingChaps=s.chaps.some(c=>c.n.toLowerCase().includes(q));
        if(matchingChaps)openSub[s.id]=true;
        return matchesName||matchingChaps;
      });
    }
    const op=openYear[y]!==false;
    h+=`<div class="yhead ${op?'':'cl'}" onclick="openYear['${y}']=${!op?'true':'false'};renderProg()">
      <span class="yi">${YICON[y]}</span><span class="yn">${y}</span>
      <span class="ypct">${arr.length?pctG(arr)+'%':'—'}</span><span class="ychev">${op?'▾':'▸'}</span></div>`;
    if(op){
      h += arr.map(s=>subjCard(s,q)).join('');
      h += `<button class="btn ghost" style="margin-top:10px;padding:10px;font-size:13px" onclick="openSubjectFor('${y}')">＋ 在${y}新增科目</button>`;
    }
  });
  list.innerHTML=h;
}
let openSub={}, openYear={'國一':true,'國二':true,'國三':true};
function subjCard(s, q){
  const dd=s.chaps.filter(c=>c.done).length, tt=s.chaps.length, pct=tt?Math.round(dd/tt*100):0;
  const opened=openSub[s.id];
  const tcol=s.tag==='複習'?'#f59e0b':(s.tag==='預習'?'#22a06b':'#64748b');
  const tagB=s.tag?`<span class="gtag" style="background:${tcol}22;color:${tcol}">${s.tag==='複習'?'🔁複習':s.tag==='預習'?'🌱預習':esc(s.tag)}</span>`:'';
  const chaps=s.chaps.map((c,i)=>{
    const isMatch=q&&c.n.toLowerCase().includes(q);
    const chapNameHtml=isMatch?esc(c.n).replace(new RegExp(`(${esc(q)})`,'gi'),'<mark style="background:#ffe08a;color:#2b2417;padding:0 2px;border-radius:3px">$1</mark>'):esc(c.n);
    return `<div class="chap ${c.done?'done':''}"><button class="ck" onclick="toggleChap('${s.id}',${i})">${c.done?'✓':''}</button><span>${chapNameHtml}</span><button class="del" onclick="delChap('${s.id}',${i})">✕</button></div>`;
  }).join('');
  return `<div class="card subj">
    <div class="sh" onclick="openSub['${s.id}']=!openSub['${s.id}'];renderProg()">
      <span class="dot" style="background:${s.color}"></span>
      <span class="snm">${s.emoji?s.emoji+' ':''}${esc(s.name)}</span>
      ${tagB}
      <span class="pct">${pct}% <small style="font-weight:700;opacity:.7">${dd}/${tt}</small></span>
    </div>
    <div class="barwrap"><div class="bar"><i style="width:${pct}%;background:${s.color}"></i></div></div>
    ${opened?`<div class="chaps">${chaps||'<div class="none" style="padding:6px">還沒有章節</div>'}</div>
      <div class="subadd"><input id="ci_${s.id}" placeholder="新增章節名稱…" onkeydown="if(event.key==='Enter')addChap('${s.id}')"><button onclick="addChap('${s.id}')">＋</button></div>
      <div style="display:flex;gap:8px;margin-top:10px"><button class="btn ghost" style="flex:1;padding:9px;font-size:12.5px" onclick="editSubject('${s.id}')">✏️ 編輯科目</button><button class="btn ghost" style="flex:0 0 auto;padding:9px 14px;font-size:12.5px;color:var(--cram)" onclick="delSubject('${s.id}')">刪除</button></div>`:''}
  </div>`;
}
function toggleChap(sid,i){const s=subjOf(sid);const c=s.chaps[i];c.done=!c.done;if(c.done&&!c.xp){c.xp=1;awardXP(30);}save();renderProg();}
function delChap(sid,i){const s=subjOf(sid);s.chaps.splice(i,1);save();renderProg();}
function addChap(sid){const el=document.getElementById('ci_'+sid);const v=(el.value||'').trim();if(!v)return;subjOf(sid).chaps.push({n:v,done:false});save();renderProg();setTimeout(()=>{const e=document.getElementById('ci_'+sid);if(e){e.focus();}},30);}
function delSubject(sid){if(!confirm('刪除整個科目與其進度？'))return;S.subjects=S.subjects.filter(x=>x.id!==sid);S.routine.forEach(r=>{if(r.subjectId===sid)r.subjectId=null;});save();renderProg();}

function targetRowHtml(t,i){
  const kind=t.kind||'subject', sid=t.subjectId||'', target=Number(t.target)||0, s=subjOf(sid), max=s?s.chaps.length:999;
  if(kind==='custom')return `<div class="targetrow">

function setTargetKind(i,kind){
  const old=S.plan.targets[i]||{};
  if(kind==='custom')S.plan.targets[i]={kind:'custom',name:old.name||'自訂目標',target:Number(old.target)||30,done:Number(old.done)||0,unit:old.unit||'項'};
  else {
    const s=S.subjects[0];
    S.plan.targets[i]={kind:'subject',subjectId:old.subjectId||(s&&s.id)||'',target:Number(old.target)||Math.max(1,(s&&s.chaps.length)||1)};
  }
  save(); renderSet();
}
function addTargetSubject(){
  S.plan.targets=S.plan.targets||[];
  const used=new Set(S.plan.targets.map(t=>t.subjectId));
  const s=S.subjects.find(x=>!used.has(x.id))||S.subjects[0];
  if(!s){ alert('目前還沒有科目。請先到「忍者等級」載入或新增科目，或改按「＋自訂目標」。'); return; }
  S.plan.targets.push({kind:'subject',subjectId:s.id,target:Math.max(1,s.chaps.length||1)});
  save(); renderSet();
}
function addTargetCustom(){
  S.plan.targets=S.plan.targets||[];

}

/* ---------- 友善時間選擇（時/分下拉 + 時長快速鍵）---------- */
function timeSelects(pfx,value){
  const [hh,mm]=(value||'').split(':');
  let ho='',mo='';
  for(let h=6;h<=23;h++){const v=String(h).padStart(2,'0');ho+=`<option value="${v}" ${v===hh?'selected':''}>${v} 時</option>`;}
  for(let h=0;h<6;h++){const v=String(h).padStart(2,'0');ho+=`<option value="${v}" ${v===hh?'selected':''}>${v} 時</option>`;}
  for(let m=0;m<60;m+=5){const v=String(m).padStart(2,'0');mo+=`<option value="${v}" ${v===mm?'selected':''}>${v} 分</option>`;}
  return `<div class="tsel"><select id="${pfx}h" onchange="onTimeChange('${pfx}')">${ho}</select><span class="cln">:</span><select id="${pfx}m" onchange="onTimeChange('${pfx}')">${mo}</select></div>`;
}
function timeVal(pfx){const h=val(pfx+'h'),m=val(pfx+'m');return (h&&m)?h+':'+m:'';}
function setEndFromStart(mins){
  const s=timeVal('st'); if(!s)return;
  const [h,m]=s.split(':').map(Number); let t=Math.min(h*60+m+mins,23*60+55);
  const eh=String(Math.floor(t/60)).padStart(2,'0'), em=String(t%60).padStart(2,'0');
  const ehs=document.getElementById('enh'), ems=document.getElementById('enm');
  if(ehs)ehs.value=eh; if(ems)ems.value=em;
}
function onTimeChange(pfx){ if(pfx==='st'){ const s=timeVal('st'), e=timeVal('en'); if(s&&(!e||e<=s)) setEndFromStart(60); } }
/* 常用時段一鍵套用（同時設開始+結束）*/
function setTime(s,e){const set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
  set('sth',s.slice(0,2));set('stm',s.slice(3));set('enh',e.slice(0,2));set('enm',e.slice(3));}

function saveSubject(sid){
  const name=val('snm').trim(); if(!name){alert('請輸入科目名稱');return;}
  const grade=window.__grade||'國二', tag=val('stag'), color=window.__col||'#4f7cff', emoji=val('semoji').trim();
  const lines=val('schaps').split('\n').map(x=>x.trim()).filter(Boolean);
  if(sid){const s=subjOf(sid);s.name=name;s.grade=grade;s.tag=tag;s.color=color;s.emoji=emoji;
    const old=s.chaps; s.chaps=lines.map(n=>{const p=old.find(c=>c.n===n);return{n,done:p?p.done:false};});
  } else { S.subjects.push({id:nid('s'),name,grade,tag,color,emoji,cat:null,chaps:lines.map(n=>({n,done:false}))}); }
  save();closeOv();openSub={};openYear[grade]=true;go('prog');
}

/* ================= 共用 ================= */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function val(id){const e=document.getElementById(id);return e?e.value:'';}
function sheet(html){document.getElementById('sheet').innerHTML=html;document.getElementById('ov').classList.add('show');}
function closeOv(){document.getElementById('ov').classList.remove('show');}
function toast(msg){let t=document.getElementById('_toast');if(!t){t=document.createElement('div');t.id='_toast';t.style.cssText='position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:rgba(20,26,45,.92);color:#fff;padding:10px 18px;border-radius:20px;font-size:13.5px;font-weight:700;z-index:99;transition:.3s;opacity:0';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';clearTimeout(t._x);t._x=setTimeout(()=>t.style.opacity='0',1500);}

<!-- 版本更新提示（家族共用模組 fam-update v1）-->
<script>
(function(){
  if(!('serviceWorker' in navigator)||window.__famUpd)return; window.__famUpd=1;
  var reg=null, shown=false, refreshing=false, watched=false;
  function mkBanner(){
    if(document.getElementById('famUpdateBanner'))return;
    var b=document.createElement('div'); b.id='famUpdateBanner';
    b.setAttribute('style','position:fixed;left:12px;right:12px;bottom:calc(16px + env(safe-area-inset-bottom,0px));z-index:2147483000;max-width:520px;margin:0 auto;background:linear-gradient(135deg,#16a34a,#0d9488);color:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 8px 26px rgba(16,163,74,.45);display:flex;align-items:center;gap:10px;font:600 14px/1.4 system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif');
    b.innerHTML='<div style="flex:1"><b>🎉 有新版本可用</b><br><span style="font-size:12.5px;font-weight:400;opacity:.95">點「立即更新」套用最新版</span></div><button id="famUpdGo" style="background:#fff;color:#0d9488;border:0;border-radius:10px;padding:8px 15px;font:800 13.5px system-ui,sans-serif;cursor:pointer">立即更新</button><button id="famUpdX" aria-label="close" style="background:rgba(255,255,255,.22);border:0;color:#fff;width:30px;height:30px;border-radius:8px;font-size:15px;cursor:pointer">✕</button>';
    (document.body||document.documentElement).appendChild(b);
    document.getElementById('famUpdX').onclick=function(){b.remove()};
    document.getElementById('famUpdGo').onclick=function(){
      var w=reg&&reg.waiting;
      if(w){['SKIP_WAITING','skipWaiting',{type:'SKIP_WAITING'}].forEach(function(m){try{w.postMessage(m)}catch(e){}});b.remove();setTimeout(function(){if(!refreshing){refreshing=true;location.reload();}},1800);}
      else location.reload();
    };
  }
  function show(){if(shown)return;shown=true;mkBanner();}
  function watch(r){
    if(!r||watched)return; watched=true; reg=r;
    if(r.waiting&&navigator.serviceWorker.controller)show();
    r.addEventListener('updatefound',function(){var nw=r.installing;if(!nw)return;
      nw.addEventListener('statechange',function(){if(nw.state==='installed'&&navigator.serviceWorker.controller)show();});});
    try{setInterval(function(){r.update().catch(function(){});},30*60*1000);}catch(e){}
  }
  navigator.serviceWorker.getRegistration().then(watch).catch(function(){});
  navigator.serviceWorker.ready.then(watch).catch(function(){});
  navigator.serviceWorker.addEventListener('controllerchange',function(){if(refreshing)return;refreshing=true;location.reload();});
})();
</script>
